<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAILY MANAGEMENT</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="app-shell">
        <aside class="side-toolbar">
            <div class="toolbar-main">
                <div class="toolbar-brand">DM</div>
                <div class="toolbar-actions">
                    <button class="tool-button is-active" id="view-active-button" type="button" aria-label="最近待办" title="最近待办">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M7 7h10M7 12h10M7 17h6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                    </button>
                    <button class="tool-button" id="view-archive-button" type="button" aria-label="待办收纳箱" title="待办收纳箱">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M5 7.5h14v3H5zm1 4.5h12v6H6z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                            <path d="M10 11v2h4v-2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                    </button>
                    <button class="tool-button" id="sync-button" type="button" aria-label="同步数据" title="同步数据">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M17.5 8A6 6 0 0 0 7.3 6.3L5.5 8.1M6.5 16A6 6 0 0 0 16.7 17.7l1.8-1.8" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M5.5 4.8v3.3h3.3M18.5 19.2v-3.3h-3.3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="toolbar-footer">
                <button class="tool-button pin-toggle-button" id="pin-button" type="button" aria-pressed="false" aria-label="置顶窗口" title="置顶窗口">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M15.6 3.5 20.5 8.4l-2.1 2.1-1.4-1.4-3.2 3.2v3.3l-1.7 1.7-1.2-4.5-4.5-1.2 1.7-1.7h3.3L14.6 6l-1.4-1.4 2.4-1.1z" fill="currentColor"/>
                    </svg>
                </button>
                <div class="settings-shell">
                    <button class="tool-button settings-button" id="settings-button" type="button" aria-haspopup="menu" aria-expanded="false" aria-label="设置" title="设置">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M10.9 2.9a1 1 0 0 1 2.2 0l.36 1.63a7.68 7.68 0 0 1 1.57.65l1.45-.83a1 1 0 0 1 1.5.87v1.67c.47.37.9.79 1.28 1.26l1.66.01a1 1 0 0 1 .87 1.5l-.84 1.45c.28.5.5 1.03.66 1.58l1.62.35a1 1 0 0 1 0 2.22l-1.62.35a7.6 7.6 0 0 1-.66 1.58l.84 1.45a1 1 0 0 1-.87 1.5l-1.66.02c-.38.46-.81.88-1.28 1.25v1.67a1 1 0 0 1-1.5.87l-1.45-.83a7.68 7.68 0 0 1-1.57.65l-.36 1.63a1 1 0 0 1-2.2 0l-.36-1.63a7.68 7.68 0 0 1-1.57-.65l-1.45.83a1 1 0 0 1-1.5-.87v-1.67a7.93 7.93 0 0 1-1.28-1.25l-1.66-.01a1 1 0 0 1-.87-1.5l.84-1.45a7.6 7.6 0 0 1-.66-1.58l-1.62-.35a1 1 0 0 1 0-2.22l1.62-.35c.16-.55.38-1.08.66-1.58l-.84-1.45a1 1 0 0 1 .87-1.5l1.66-.01c.38-.47.81-.89 1.28-1.26V5.21a1 1 0 0 1 1.5-.87l1.45.83c.5-.28 1.03-.5 1.57-.65zM12 9.2A2.8 2.8 0 1 0 12 14.8 2.8 2.8 0 0 0 12 9.2z" fill="currentColor"/>
                        </svg>
                    </button>
                    <div class="settings-menu hidden" id="settings-menu" role="menu">
                        <p class="settings-version" id="settings-version">当前版本读取中</p>
                        <button class="settings-item" id="settings-refresh-button" type="button" role="menuitem">刷新记录</button>
                        <button class="settings-item" id="settings-version-button" type="button" role="menuitem">检测更新</button>
                        <button class="settings-item danger" id="settings-logout-button" type="button" role="menuitem">退出登录</button>
                    </div>
                </div>
            </div>
        </aside>

        <main class="panel-stack">
            <section class="panel login-panel" id="login-panel">
                <div class="panel-header">
                    <p class="section-label">DAILY MANAGEMENT</p>
                    <h1>登录</h1>
                </div>
                <form id="login-form" class="form-stack login-form">
                    <label class="field">
                        <span>服务地址</span>
                        <input id="api-base-input" name="apiBase" type="url" placeholder="https://dailymanagement.tonybase.site" required>
                    </label>
                    <label class="field">
                        <span>用户名</span>
                        <input id="username-input" name="username" type="text" autocomplete="username" required>
                    </label>
                    <label class="field">
                        <span>密码</span>
                        <input id="password-input" name="password" type="password" autocomplete="current-password" required>
                    </label>
                    <button class="primary-button" id="login-button" type="submit">登录</button>
                    <p class="status-text" id="login-status"></p>
                </form>
            </section>

            <section class="panel hidden capture-panel" id="capture-panel">
                <div class="history-header">
                    <div class="history-title">
                        <p class="section-label">DAILY MANAGEMENT</p>
                        <h1 id="view-title">最近待办</h1>
                    </div>
                    <span class="history-count" id="recent-count">0</span>
                </div>

                <ul class="history-list" id="recent-list">
                    <li class="empty-state">暂无记录</li>
                </ul>

                <form id="capture-form" class="capture-form">
                    <textarea id="idea-input" name="idea" rows="2" placeholder="记录一条待办，Ctrl+Enter 提交" required></textarea>
                    <button class="primary-button" id="submit-button" type="submit">记录</button>
                    <p class="status-text" id="capture-status"></p>
                </form>
            </section>

            <p class="app-status" id="app-status"></p>
        </main>

        <div class="dialog-backdrop hidden" id="dialog-backdrop" aria-hidden="true">
            <section class="dialog-card" role="dialog" aria-modal="true" aria-labelledby="dialog-title">
                <p class="section-label">桌面更新</p>
                <h2 id="dialog-title">提示</h2>
                <p class="dialog-message" id="dialog-message"></p>
                <div class="dialog-actions">
                    <button class="secondary-button hidden" id="dialog-cancel-button" type="button">取消</button>
                    <button class="primary-button" id="dialog-confirm-button" type="button">确定</button>
                </div>
            </section>
        </div>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
