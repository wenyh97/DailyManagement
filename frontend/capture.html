<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>待办收集</title>
    <meta name="theme-color" content="#0f766e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="待办收集">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/capture-icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/capture.css">
    <script src="js/auth.js"></script>
    <script>
        checkLogin();
    </script>
</head>
<body>
    <main class="capture-shell">
        <section class="capture-card">
            <header class="capture-header">
                <div class="capture-heading">
                    <p class="capture-kicker">Daily Management</p>
                    <h1>待办收集</h1>
                    <p class="capture-subtitle">先把待处理事项记下来，再决定怎么安排。</p>
                </div>
                <button type="button" class="icon-button capture-refresh-button" id="refresh-button" aria-label="刷新待办列表" title="刷新">
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M17.5 8A6 6 0 0 0 7.3 6.3L5.5 8.1M6.5 16A6 6 0 0 0 16.7 17.7l1.8-1.8" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"></path>
                        <path d="M5.5 4.8v3.3h3.3M18.5 19.2v-3.3h-3.3" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </button>
            </header>

            <form id="capture-form" class="capture-form">
                <textarea
                    id="capture-input"
                    class="capture-input"
                    rows="3"
                    maxlength="256"
                    placeholder="写一句就行，比如：周四和小李确认需求"
                    autofocus
                ></textarea>
                <div class="capture-actions">
                    <button type="submit" class="primary-button" id="submit-button">立即记录</button>
                </div>
                <p class="capture-help" id="capture-help"></p>
            </form>

            <section class="capture-panel" id="queued-panel" hidden>
                <div class="panel-header">
                    <h2>待同步</h2>
                    <span id="queued-count">0 条</span>
                </div>
                <ul class="capture-list" id="queued-list"></ul>
            </section>

            <section class="capture-panel capture-browser-panel">
                <div class="capture-browser-toolbar">
                    <div class="capture-view-switcher" role="tablist" aria-label="待办视图切换">
                        <button type="button" class="capture-view-tab active" id="active-view-tab" data-capture-view="active" role="tab" aria-selected="true">
                            <span class="capture-view-label">待处理</span>
                            <span class="capture-view-count" id="active-view-count">0</span>
                        </button>
                        <button type="button" class="capture-view-tab" id="archive-view-tab" data-capture-view="archive" role="tab" aria-selected="false">
                            <span class="capture-view-label">待办收纳</span>
                            <span class="capture-view-count" id="archive-view-count">0</span>
                        </button>
                    </div>
                </div>
            </section>

            <section class="capture-panel capture-panel-list" data-capture-panel="active">
                <div class="panel-header">
                    <h2>刚刚记下</h2>
                    <span id="recent-count">0 条</span>
                </div>
                <ul class="capture-list" id="recent-list">
                    <li class="empty-state">正在加载刚刚记下的待办...</li>
                </ul>
            </section>

            <section class="capture-panel capture-panel-list" data-capture-panel="archive" hidden>
                <div class="panel-header">
                    <h2>待办收纳</h2>
                    <span id="archive-count">0 条</span>
                </div>
                <ul class="capture-list" id="archive-list">
                    <li class="empty-state">正在加载已收纳的待办...</li>
                </ul>
            </section>

            <footer class="capture-footer">
                <div class="capture-footer-status">
                    <span class="footer-status-item" id="network-status">检测网络中</span>
                    <span class="footer-status-separator">/</span>
                    <span class="footer-status-item is-muted" id="sync-status">准备就绪</span>
                </div>
                <button type="button" class="ghost-button capture-footer-button" id="logout-button">退出</button>
            </footer>
        </section>
    </main>

    <script src="js/capture.js"></script>
</body>
</html>
