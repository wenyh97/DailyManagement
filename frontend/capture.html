<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>灵感收集</title>
    <meta name="theme-color" content="#0f766e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="灵感收集">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/capture-icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/capture.css">
    <script src="js/auth.js"></script>
    <script>
        checkLogin();
    </script>
</head>
<body>
    <main class="capture-shell">
        <section class="capture-card">
            <header class="capture-header">
                <div>
                    <p class="capture-kicker">Daily Management</p>
                    <h1>灵感收集</h1>
                    <p class="capture-subtitle">先把灵感记下来，以后再做细分。</p>
                </div>
            </header>

            <form id="capture-form" class="capture-form">
                <textarea
                    id="capture-input"
                    class="capture-input"
                    rows="3"
                    maxlength="256"
                    placeholder="写一句就行，比如：周四和小李确认需求"
                    autofocus
                ></textarea>
                <div class="capture-actions">
                    <button type="button" class="secondary-button" id="clear-draft-button">清空草稿</button>
                    <button type="submit" class="primary-button" id="submit-button">立即记录</button>
                </div>
                <p class="capture-help" id="capture-help">一条就一句，清晰更明确</p>
            </form>

            <section class="capture-panel" id="queued-panel" hidden>
                <div class="panel-header">
                    <h2>待同步</h2>
                    <span id="queued-count">0 条</span>
                </div>
                <ul class="capture-list" id="queued-list"></ul>
            </section>

            <section class="capture-panel">
                <div class="panel-header">
                    <h2>刚刚记下</h2>
                    <button type="button" class="link-button" id="refresh-button">刷新</button>
                </div>
                <ul class="capture-list" id="recent-list">
                    <li class="empty-state">正在加载刚刚记下的内容...</li>
                </ul>
            </section>

            <footer class="capture-footer">
                <div class="capture-meta capture-meta-footer">
                    <span class="status-chip" id="network-status">检测网络中</span>
                    <span class="status-chip muted" id="sync-status">准备就绪</span>
                </div>
                <button type="button" class="ghost-button capture-footer-button" id="logout-button">退出</button>
            </footer>
        </section>
    </main>

    <script src="js/capture.js"></script>
</body>
</html>
