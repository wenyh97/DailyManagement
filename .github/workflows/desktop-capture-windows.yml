name: Build Desktop Capture

env:
  SERVER_HOST: 20.24.210.200
  SERVER_USER: TonyAdmin
  SERVER_BASE_PATH: /home/TonyAdmin
  DOWNLOAD_BASE_URL: https://dailymanagement.tonybase.site/downloads/desktop
  RUST_BACKTRACE: 1

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "desktop-capture/**"
      - ".github/workflows/desktop-capture-windows.yml"

permissions:
  contents: read

jobs:
  build-windows-installer:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh
        working-directory: desktop-capture

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-capture/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run tauri -- build --bundles nsis --verbose

      - name: Prepare release assets
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $releaseDir = "release-assets"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          $installer = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            throw "未找到 NSIS 安装包输出"
          }

          $versionedName = "tonydm-tonybase-capture-$version-x64-setup.exe"
          $latestName = "tonydm-tonybase-capture-latest-x64-setup.exe"

          Copy-Item $installer.FullName (Join-Path $releaseDir $versionedName) -Force
          Copy-Item $installer.FullName (Join-Path $releaseDir $latestName) -Force

          $metadata = [ordered]@{
            product = "TonyBase Capture"
            version = $version
            platform = "windows-x64"
            installerName = $versionedName
            latestInstallerName = $latestName
            downloadUrl = "${{ env.DOWNLOAD_BASE_URL }}/$versionedName"
            latestDownloadUrl = "${{ env.DOWNLOAD_BASE_URL }}/$latestName"
            publishedAt = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            notes = @(
              "桌面快速记录窗口首个远程构建版本",
              "支持登录、快速提交、全局快捷键、托盘驻留骨架"
            )
            required = $false
          } | ConvertTo-Json -Depth 4

          Set-Content -Path (Join-Path $releaseDir "desktop-latest.json") -Value $metadata -Encoding utf8

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: tonybase-capture-windows-installer
          path: |
            desktop-capture/src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload unpacked executable
        uses: actions/upload-artifact@v4
        with:
          name: tonybase-capture-windows-executable
          path: |
            desktop-capture/src-tauri/target/release/*.exe

      - name: Upload release assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: tonybase-capture-release-assets
          path: |
            desktop-capture/release-assets/*

  deploy-release-assets:
    runs-on: ubuntu-latest
    needs: build-windows-installer

    steps:
      - name: Download release assets artifact
        uses: actions/download-artifact@v4
        with:
          name: tonybase-capture-release-assets
          path: release-assets

      - name: Upload release assets to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "release-assets/*"
          target: ${{ env.SERVER_BASE_PATH }}/desktop-upload-temp

      - name: Publish desktop installer on server
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -euo pipefail
            BASE="${{ env.SERVER_BASE_PATH }}"
            mkdir -p "$BASE/frontend/downloads/desktop" "$BASE/frontend/downloads/metadata"
            cp "$BASE/desktop-upload-temp/release-assets/"*.exe "$BASE/frontend/downloads/desktop/"
            cp "$BASE/desktop-upload-temp/release-assets/desktop-latest.json" "$BASE/frontend/downloads/metadata/desktop-latest.json"
            rm -rf "$BASE/desktop-upload-temp"